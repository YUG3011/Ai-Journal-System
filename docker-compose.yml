version: '3.9'
services:
  db:
    image: postgres:15
    container_name: ai-journal-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aijournal
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ai-journal-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  backend:
    build: ./backend
    container_name: ai-journal-backend
    env_file:
      - .env
    environment:
      PORT: 4000
      DATABASE_URL: postgres://postgres:postgres@db:5432/aijournal
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      REDIS_URL: redis://redis:6379
      # Set GEMINI_MODEL in backend/.env to a model supported by your Google account
    ports:
      - "4000:4000"
    depends_on:
      - db
      - redis
    command: sh -c "npx prisma migrate deploy && npm start"

volumes:
  pgdata:
  redisdata:
